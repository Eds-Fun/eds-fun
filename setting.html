<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ Pengaturan Persentase Roda</title>
    <style>
        :root {
            --bg-app: #0f172a; --bg-card: #1e293b; --primary: #3b82f6;
            --success: #10b981; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg-app); color: var(--text-main); max-width: 500px; margin: 0 auto; padding: 30px 15px; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        p.subtitle { text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 25px; }
        .row { display: flex; align-items: center; justify-content: space-between; background: var(--bg-card); padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .item-name { font-weight: 600; color: #cbd5e1; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .w-input { width: 70px; padding: 6px; border-radius: 6px; border: 2px solid var(--border); background: var(--bg-app); color: white; text-align: center; font-weight: 600; }
        .lock-zone { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text-muted); cursor: pointer; }
        .btn-save { width: 100%; padding: 14px; margin-top: 15px; background: var(--success); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .status-bar { display: flex; justify-content: space-between; margin-top: 12px; font-size: 13px; color: var(--text-muted); }
        .error { color: #ef4444; }
    </style>
</head>
<body>

    <h2>⚙️ Set Probabilitas</h2>
    <p class="subtitle">Kunci angka pilihan dan biarkan sisa persentase membagi rata otomatis</p>
    
    <div id="weight-list"></div>
    
    <div class="status-bar">
        <span>Sistem Auto-Balance Aktif</span>
        <span id="total-indicator">Total: 100%</span>
    </div>
    
    <button class="btn-save" onclick="saveWeights()">Simpan Konfigurasi</button>

    <script>
        const BACKEND_URL = "https://eds-fun-eds-fun.hf.space"; 
        let config = { items: [], weights: [], locked: [], mode: "normal" };

        async function load() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/config`);
                config = await res.json();
                renderRows();
            } catch (err) {
                console.error(err);
            }
        }

        function renderRows() {
            const list = document.getElementById('weight-list');
            list.innerHTML = '';
            
            if (!config.items || config.items.length === 0) {
                list.innerHTML = `<div style="text-align:center;color:var(--text-muted);">Item kosong. Silakan tambahkan di menu roda.</div>`;
                return;
            }

            config.items.forEach((item, i) => {
                const isChecked = config.locked[i] ? 'checked' : '';
                list.innerHTML += `
                    <div class="row">
                        <span class="item-name">Item ${item}</span>
                        <div class="controls">
                            <label class="lock-zone">
                                <input type="checkbox" class="l-check" ${isChecked} onchange="toggleLock(${i})"> 🔒 Kunci
                            </label>
                            <input type="number" step="any" class="w-input" value="${config.weights[i]}" oninput="liveBalance(${i})">
                            <span>%</span>
                        </div>
                    </div>`;
            });
            updateTotal();
        }

        function toggleLock(index) {
            const checkboxes = document.querySelectorAll('.l-check');
            config.locked[index] = checkboxes[index].checked;
            liveBalance(null);
        }

        function liveBalance(changedIndex) {
            const rows = document.querySelectorAll('.row');
            let weights = [];
            let locked = [...config.locked];

            if (changedIndex !== null) {
                locked[changedIndex] = true;
                const checkboxes = document.querySelectorAll('.l-check');
                if (checkboxes[changedIndex]) checkboxes[changedIndex].checked = true;
                config.locked[changedIndex] = true;
            }

            rows.forEach(row => weights.push(parseFloat(row.querySelector('.w-input').value) || 0));
            if (changedIndex !== null) config.weights[changedIndex] = weights[changedIndex];

            let lockedSum = 0;
            let unlockedCount = 0;
            
            locked.forEach((l, idx) => { 
                if (l) lockedSum += weights[idx]; 
                else unlockedCount++; 
            });

            if (lockedSum <= 100 && unlockedCount > 0) {
                let remaining = 100 - lockedSum;
                let perUnlocked = Math.round((remaining / unlockedCount) * 100) / 100;
                let unlockedSeen = 0;

                rows.forEach((row, idx) => {
                    if (!locked[idx]) {
                        unlockedSeen++;
                        const wInput = row.querySelector('.w-input');
                        if (unlockedSeen === unlockedCount) {
                            let currentSum = 0;
                            rows.forEach((r, i) => { if (i !== idx) currentSum += parseFloat(r.querySelector('.w-input').value) || 0; });
                            wInput.value = (100 - currentSum).toFixed(2);
                        } else { 
                            wInput.value = perUnlocked.toFixed(2); 
                        }
                        config.weights[idx] = parseFloat(wInput.value);
                    }
                });
            }
            updateTotal();
        }

        function updateTotal() {
            const inputs = document.querySelectorAll('.w-input');
            let sum = 0; inputs.forEach(i => sum += parseFloat(i.value) || 0);
            const indicator = document.getElementById('total-indicator');
            indicator.innerText = `Total: ${sum.toFixed(2)}%`;
            indicator.classList.toggle('error', Math.abs(sum - 100) > 0.1);
        }

        async function saveWeights() {
            const rows = document.querySelectorAll('.row');
            config.weights = Array.from(rows).map(row => parseFloat(row.querySelector('.w-input').value) || 0);
            config.locked = Array.from(rows).map(row => row.querySelector('.l-check').checked);
            
            try {
                const res = await fetch(`${BACKEND_URL}/api/config`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(config)
                });
                if (res.ok) { alert("Konfigurasi disimpan!"); load(); }
            } catch (err) {
                console.error(err);
            }
        }

        window.onload = load;
    </script>
</body>
</html>
