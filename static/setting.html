<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ Pengaturan Persentase Roda</title>
    <style>
        :root {
            --bg-app: #0f172a;
            --bg-card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --success-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
        }

        body { 
            background: var(--bg-app); 
            color: var(--text-main); 
            max-width: 550px; 
            margin: 0 auto; 
            padding: 40px 20px; 
        }

        h2 { 
            text-align: center; 
            margin-bottom: 10px; 
            font-weight: 700; 
            color: var(--primary); 
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: var(--bg-card); 
            padding: 16px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            border: 1px solid var(--border);
        }

        .item-name { 
            font-size: 16px; 
            font-weight: 600; 
            color: #cbd5e1; 
        }

        .controls { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }

        .w-input { 
            width: 80px; 
            padding: 8px 10px; 
            border-radius: 8px; 
            border: 2px solid var(--border); 
            background: var(--bg-app); 
            color: white; 
            text-align: center; 
            font-size: 15px; 
            font-weight: 600;
        }

        .w-input:focus { 
            border-color: var(--primary); 
            outline: none; 
        }

        /* Menghilangkan panah bawaan input number */
        .w-input::-webkit-outer-spin-button,
        .w-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .lock-zone { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-size: 13px; 
            color: var(--text-muted); 
            cursor: pointer; 
            font-weight: 500; 
            user-select: none;
        }

        .lock-zone input { 
            width: 16px; 
            height: 16px; 
            accent-color: var(--primary); 
            cursor: pointer;
        }

        .btn-save { 
            width: 100%; 
            padding: 15px; 
            margin-top: 20px; 
            background: var(--success); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            transition: background 0.2s, transform 0.1s; 
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-save:hover { 
            background: var(--success-hover); 
            transform: translateY(-1px);
        }

        .btn-save:active {
            transform: translateY(1px);
        }

        .status-bar { 
            display: flex;
            justify-content: space-between;
            margin-top: 15px; 
            font-size: 14px; 
            font-weight: 600; 
            color: var(--text-muted); 
            padding: 0 5px;
        }
        
        #total-indicator.error {
            color: #ef4444;
        }
    </style>
</head>
<body>

    <h2>⚙️ Set Probabilitas Rahasia</h2>
    <p class="subtitle">Kunci angka tertentu dan biarkan sisa persentase membagi rata otomatis</p>
    
    <div id="weight-list"></div>
    
    <div class="status-bar">
        <span>Status: Sistem Auto-Balance Aktif</span>
        <span id="total-indicator">Total Persentase: 100%</span>
    </div>
    
    <button class="btn-save" onclick="saveWeights()">Simpan Konfigurasi</button>

    <script>
        // CRITICAL: Ganti URL di bawah ini dengan alamat URL Live Backend Anda (misal Hugging Face Spaces Anda)
        const BACKEND_URL = "https://eds-fun-eds-fun.hf.space";

        let config = { items: [], weights: [], locked: [], mode: "normal" };

        async function load() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/config`);
                if (!res.ok) throw new Error("Gagal mengambil data dari backend.");
                config = await res.json();
                renderRows();
            } catch (err) {
                alert("Koneksi ke backend gagal! Periksa kembali variabel BACKEND_URL Anda.");
                console.error(err);
            }
        }

        function renderRows() {
            const list = document.getElementById('weight-list');
            list.innerHTML = '';
            
            if (!config.items || config.items.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding: 20px; color: var(--text-muted);">Tidak ada item yang tersedia. Tambahkan item dari halaman utama terlebih dahulu.</div>`;
                return;
            }

            config.items.forEach((item, i) => {
                const isChecked = config.locked[i] ? 'checked' : '';
                list.innerHTML += `
                    <div class="row">
                        <span class="item-name">Item ${item}</span>
                        <div class="controls">
                            <label class="lock-zone">
                                <input type="checkbox" class="l-check" ${isChecked} onchange="toggleLock(${i})"> 🔒 Kunci
                            </label>
                            <input type="number" step="any" class="w-input" value="${config.weights[i]}" oninput="liveBalance(${i})">
                            <span style="font-weight:600; color:#475569">%</span>
                        </div>
                    </div>`;
            });
            updateTotal();
        }

        function toggleLock(index) {
            const checkboxes = document.querySelectorAll('.l-check');
            config.locked[index] = checkboxes[index].checked;
            // Jalankan penyeimbangan ulang instan saat status kunci diubah
            liveBalance(null);
        }

        function liveBalance(changedIndex) {
            const rows = document.querySelectorAll('.row');
            let weights = [];
            let locked = [...config.locked];

            // Jika user mengubah nilai input, otomatis kunci baris tersebut
            if (changedIndex !== null) {
                locked[changedIndex] = true;
                const checkboxes = document.querySelectorAll('.l-check');
                if (checkboxes[changedIndex]) checkboxes[changedIndex].checked = true;
                config.locked[changedIndex] = true;
            }

            rows.forEach(row => weights.push(parseFloat(row.querySelector('.w-input').value) || 0));
            if (changedIndex !== null) config.weights[changedIndex] = weights[changedIndex];

            let lockedSum = 0;
            let unlockedCount = 0;
            
            locked.forEach((l, idx) => { 
                if (l) lockedSum += weights[idx]; 
                else unlockedCount++; 
            });

            if (lockedSum <= 100 && unlockedCount > 0) {
                let remaining = 100 - lockedSum;
                let perUnlocked = Math.round((remaining / unlockedCount) * 100) / 100;
                let unlockedSeen = 0;

                rows.forEach((row, idx) => {
                    if (!locked[idx]) {
                        unlockedSeen++;
                        const wInput = row.querySelector('.w-input');
                        if (unlockedSeen === unlockedCount) {
                            let currentSum = 0;
                            rows.forEach((r, i) => { 
                                if (i !== idx) currentSum += parseFloat(r.querySelector('.w-input').value) || 0; 
                            });
                            wInput.value = (100 - currentSum).toFixed(2);
                        } else { 
                            wInput.value = perUnlocked.toFixed(2); 
                        }
                        config.weights[idx] = parseFloat(wInput.value);
                    }
                });
            }
            updateTotal();
        }

        function updateTotal() {
            const inputs = document.querySelectorAll('.w-input');
            let sum = 0; 
            inputs.forEach(i => sum += parseFloat(i.value) || 0);
            
            const indicator = document.getElementById('total-indicator');
            indicator.innerText = `Total Persentase: ${sum.toFixed(2)}%`;
            
            if (Math.abs(sum - 100) > 0.1) {
                indicator.classList.add('error');
            } else {
                indicator.classList.remove('error');
            }
        }

        async function saveWeights() {
            const rows = document.querySelectorAll('.row');
            config.weights = Array.from(rows).map(row => parseFloat(row.querySelector('.w-input').value) || 0);
            config.locked = Array.from(rows).map(row => row.querySelector('.l-check').checked);
            
            try {
                const res = await fetch(`${BACKEND_URL}/api/config`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(config)
                });
                if (res.ok) {
                    alert("Konfigurasi berhasil disimpan ke sistem pusat!");
                    load();
                } else {
                    alert("Gagal menyimpan data. Pastikan akumulasi jumlah pas 100%.");
                }
            } catch (err) {
                alert("Gagal terhubung ke server saat mencoba menyimpan data.");
                console.error(err);
            }
        }

        window.onload = load;
    </script>
</body>
</html>
