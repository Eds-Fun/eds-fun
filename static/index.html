<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roullete</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="wheel-card">
            <div class="mode-container">
                <button id="modeNormal" class="mode-btn active" onclick="changeMode('normal')">Standard Mode</button>
                <button id="modeEliminate" class="mode-btn" onclick="changeMode('elimination')">Elimination Mode</button>
            </div>

            <div class="wheel-wrapper">
                <div class="pointer"></div>
                <div id="wheel" class="wheel"></div>
            </div>

            <button onclick="spinWheel()" id="spinBtn" class="main-spin-btn">PUTAR RODA</button>
            <div id="resultCard" class="result-card">
                <span class="result-label">PEMENANG</span>
                <h1 id="resultText">-</h1>
            </div>
        </div>

        <div class="panel-card">
            <div class="panel-header">
                <h2>📝 Entri Item</h2>
                <span class="badge" id="itemCount">0 Item</span>
            </div>
            
            <div id="item-inputs" class="inputs-list"></div>
            
            <div class="panel-actions">
                <button class="btn-secondary" onclick="addItemRow()">+ Tambah Baris</button>
                <button class="btn-primary" onclick="saveItems()">Terapkan Perubahan</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
